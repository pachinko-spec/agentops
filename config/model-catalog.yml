# Claude Code / Codex 共通のモデルルーティング雛形です。
# このリポジトリ専用ではなく、グローバル運用または各プロジェクトの .agentops/ へコピーして使います。
# 正式な CLI/API model id は使用直前に公式 docs で確認してください。

schema_version: 1
scope: global-template
last_reviewed: 2026-04-28

selection_policy:
  binding: advisory
  description: このカタログは固定配車表ではなく、オーケストレーターがモデル選択するときの候補表と最低ラインです。
  orchestrator_may_override: true
  resolution_order:
    - user_explicit_instruction
    - project_local_model_catalog
    - task_risk_and_domain
    - role_default
    - current_cli_availability
    - cost_latency_context_budget
  override_rules:
    - オーケストレーターは、公式 docs で確認済みの model id、現在の CLI 対応状況、タスクのリスクに応じて候補を上書きしてよい。
    - 高リスク領域を低推論モデルへ下げる場合は、ユーザー明示指示または明確な理由を run log / PR / handoff に残す。
    - model_id が null の候補は、未確認なので実行に使わない。
  cross_review_policy:
    binding: advisory
    description: cross-review は特定モデル固定ではなく、主 orchestrator と別系列の frontier reviewer を選ぶための方針です。
    preferred_reviewer_difference:
      - different_target_cli
      - different_provider
      - different_model_family
    primary_to_reviewer_candidates:
      - primary_cli: codex
        preferred_reviewer_cli: claude
        preferred_provider: anthropic
      - primary_cli: claude
        preferred_reviewer_cli: codex
        preferred_provider: openai
    consideration_triggers:
      - high_risk_design
      - new_feature
      - refactor
      - dependency_addition
      - public_api_contract
      - deployment_or_infra_change
      - review_fix_followup
    decision_owner: orchestrator_frontier
    notes:
      - reviewer は所見を出し、採否と統合判断は主 orchestrator が持つ。
      - 実 model id は使用直前に公式 docs と対象 CLI の現在仕様で確認する。
  high_risk_triggers:
    - authentication
    - authorization
    - session_management
    - secrets_or_credentials
    - cryptography
    - payments_or_billing
    - privacy_or_personal_data
    - public_api_contract
    - database_migration_or_data_loss
    - deployment_or_infra_change
    - security_fix
    - incident_response
  escalation_rules:
    - when: high_risk_design
      minimum_role: architect_frontier
      minimum_effort: xhigh
      independent_review_role: review_frontier
    - when: high_risk_implementation
      minimum_role: coding_frontier
      minimum_effort: high
      prefer_effort: xhigh
      independent_review_role: review_frontier
    - when: security_fix
      minimum_role: coding_frontier
      minimum_effort: xhigh
      independent_review_role: review_frontier
      notes: セキュリティ修正は差分が小さくても高リスク扱いにする。
    - when: low_risk_mechanical_change
      allowed_roles:
        - coding_fast
        - docs_agent
      maximum_scope: typo、コメント、docs、テスト期待値の明確な更新、局所的なリネーム
  prohibited_downgrades:
    - coding_fast は authentication / authorization / secrets / cryptography / payments / security_fix には使わない。
    - research_fast の調査結果だけで高リスク設計を確定しない。
    - docs_agent だけで API 契約やセキュリティ方針を変更しない。

roles:
  - role: orchestrator_frontier
    purpose: 複雑タスクの分解、委譲計画、統合判断、停止条件判断
    default_effort: xhigh
    candidates:
      - target_cli: codex
        provider: openai
        model_family: frontier reasoning model
        model_id: null
        notes: >-
          Codex CLI で利用可能な最新の高推論モデルを公式 docs で確認して設定する。
          採用例 (advisory): 2026-04-28 時点でユーザーグローバル側に GPT 系の高推論モデル
          (例: gpt-5.5 系) を採用したケースあり。
          ChatGPT auth 限定の場合があり、API key auth 環境では下位モデルへ override される
          ことに注意。実 model id は使用直前に公式 docs で確認する。
      - target_cli: claude
        provider: anthropic
        model_family: frontier reasoning model
        model_id: null
        notes: Claude Code CLI で利用可能な最新の高推論モデルを公式 docs で確認して設定する。

  - role: architect_frontier
    purpose: 複雑な設計、アーキテクチャ判断、ハイリスク実装方針
    default_effort: xhigh
    candidates:
      - target_cli: codex
        provider: openai
        model_family: frontier reasoning model
        model_id: null
        notes: >-
          GPT 系列に固定しない。Codex CLI 側の現在の model id を確認して埋める。
          採用例 (advisory): 2026-04-28 時点でユーザーグローバル側に GPT 系の高推論モデル
          (例: gpt-5.5 系) を採用したケースあり。ChatGPT auth 限定の場合があるため、
          API key auth 環境ではダウングレードまたは別ロールへ振り直す。
      - target_cli: claude
        provider: anthropic
        model_family: frontier reasoning model
        model_id: null
        notes: Claude 側では Anthropic の対応 model id を確認して埋める。

  - role: review_frontier
    purpose: 設計レビュー、コードレビュー、セキュリティ観点、cross-review、品質ゲート判断
    default_effort: xhigh
    candidates:
      - target_cli: codex
        provider: openai
        model_family: frontier reasoning model
        model_id: null
        notes: >-
          Claude Code / Anthropic 系が主 orchestrator の場合の cross-review 候補。
          正式な model id は Codex CLI の現在仕様で確認する。
          採用例 (advisory): 2026-04-28 時点でユーザーグローバル側に GPT 系の高推論モデル
          (例: gpt-5.5 系) を cross-review reviewer として採用したケースあり。
          ChatGPT auth 限定の場合があり、API key auth 環境では下位モデルへ override される
          ことに注意。
      - target_cli: claude
        provider: anthropic
        model_family: frontier reasoning model
        model_id: null
        notes: Codex / OpenAI 系が主 orchestrator の場合の cross-review 候補。正式な model id は Claude Code CLI の現在仕様で確認する。

  - role: coding_frontier
    purpose: 通常実装、難所の修正、レビュー後の中規模修正
    default_effort: high
    candidates:
      - target_cli: codex
        provider: openai
        model_family: coding-optimized model
        model_id: null
        notes: >-
          2026-05-01 採用例 (advisory): ユーザーグローバル側
          (`~/.claude/agentops/model-catalog.yml`) で coding_frontier の Codex 候補を
          primary として復元。Phase A (GPT-5.5 採用) と Phase B (Sonnet 4.6 baseline 化)
          並走の trim 事故 (2026-04-28 archive plan) を是正し、cross-review の
          Anthropic ↔ OpenAI 別系列原則を catalog 上で機械可読に維持。
          実 model id は使用直前に公式 docs で確認する。
      - target_cli: claude
        provider: anthropic
        model_family: balanced coding model
        model_id: null

  - role: coding_fast
    purpose: typo、軽微修正、レビュー後の小修正
    default_effort: medium
    candidates:
      - target_cli: codex
        provider: openai
        model_family: fast coding model
        model_id: null
        notes: >-
          2026-05-01 採用例 (advisory): ユーザーグローバル側で coding_fast に Codex 候補
          (coding-optimized model、`models_cache.json` 2026-05-01 取得で確認) を
          primary として新設、Sonnet 4.6 を secondary に。
          軽微コーディング / test ケース生成 / test 実行 を Codex CLI 経由で起動するケース。
          実 model id は使用直前に公式 docs で確認する。
      - target_cli: claude
        provider: anthropic
        model_family: fast balanced model
        model_id: null
        notes: >-
          採用例 (advisory): 2026-04-28 時点で軽量タスクの baseline を Anthropic の
          中位モデル (例: claude-sonnet-4-6 系) に揃えたケースあり。
          サブスクプラン下で品質優先、cutoff 新しさ、1M context、近フロンティア性能を
          重視した判断。model_family も fast * から balanced * 系へ揃える運用が成立する。
          実 model id は使用直前に公式 docs で確認する。

  - role: research_fast
    purpose: コード調査、docs調査、差分整理
    default_effort: medium
    candidates:
      - target_cli: codex
        provider: openai
        model_family: fast reasoning model
        model_id: null
      - target_cli: claude
        provider: anthropic
        model_family: fast reasoning model
        model_id: null
        notes: >-
          採用例 (advisory): 2026-04-28 時点で軽量タスクの baseline を Anthropic の
          中位モデル (例: claude-sonnet-4-6 系) に揃えたケースあり。
          サブスクプラン下で品質優先、cutoff 新しさ、1M context、近フロンティア性能を
          重視した判断。model_family も fast * から balanced * 系へ揃える運用が成立する。
          実 model id は使用直前に公式 docs で確認する。

  - role: docs_agent
    purpose: README、設計docs、PR本文、ハンドオフ整備
    default_effort: medium
    candidates:
      - target_cli: codex
        provider: openai
        model_family: fast writing/coding model
        model_id: null
        notes: >-
          2026-05-01 採用例 (advisory): ユーザーグローバル側で docs_agent に Codex 候補
          (coding-optimized model) を secondary として追加。primary は Sonnet 4.6
          (日本語品質)、secondary は code 例を含む技術設計 docs (例: docs/04-model-routing.md、
          docs/10-cli-wrapper.md) のオフロード用。
          実 model id は使用直前に公式 docs で確認する。
      - target_cli: claude
        provider: anthropic
        model_family: fast writing/coding model
        model_id: null
        notes: >-
          採用例 (advisory): 2026-04-28 時点で軽量タスクの baseline を Anthropic の
          中位モデル (例: claude-sonnet-4-6 系) に揃えたケースあり。
          サブスクプラン下で品質優先、cutoff 新しさ、1M context、近フロンティア性能を
          重視した判断。model_family も fast * から balanced * 系へ揃える運用が成立する。
          実 model id は使用直前に公式 docs で確認する。
