name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint (fail)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        # actions/checkout@v6 — Node 24 runtime (resolved 2026-04-29: commit de0fac2e4500dabe0009e67214ff5f5447ce83dd, tag v6.0.2)
        uses: actions/checkout@v6
      - name: Download actionlint (pinned to v1.7.12)
        env:
          ACTIONLINT_VERSION: "1.7.12"
          # commit SHA of rhysd/actionlint v1.7.12 tag (resolved 2026-04-29)
          ACTIONLINT_PIN_SHA: "914e7df21a07ef503a81201c76d2b11c789d3fca"
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://raw.githubusercontent.com/rhysd/actionlint/${ACTIONLINT_PIN_SHA}/scripts/download-actionlint.bash" \
            -o /tmp/download-actionlint.bash
          bash /tmp/download-actionlint.bash "${ACTIONLINT_VERSION}"
      - name: Run actionlint
        run: ./actionlint -color

  yamllint:
    name: yamllint (fail)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python 3.12
        # actions/setup-python@v6 — Node 24 runtime (resolved 2026-04-29: commit a309ff8b426b58ec0e2a45f0f869d46889d02405, tag v6.2.0)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install yamllint (pinned)
        run: python -m pip install --quiet "yamllint==1.38.0"
      - name: Run yamllint
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable, document-start: disable, truthy: disable, comments-indentation: disable}}" \
            .github/workflows config

  markdown-link-check:
    name: markdown-link-check (fail)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run markdown-link-check
        # tcort/github-action-markdown-link-check@v1.1.2 (maintained fork; gaurav-nelson is archived/deprecated 2026-04-20)
        # commit SHA pin (resolved 2026-04-29: tag v1.1.2 → e7c7a18363c842693fadde5d41a3bd3573a7a225)
        uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225
        with:
          use-quiet-mode: yes
          use-verbose-mode: yes
          config-file: .github/markdown-link-check.json
          folder-path: docs,rules,skills,workflows
          file-path: README.md,AGENTS.md,CLAUDE.md

  freshness-check:
    name: freshness-check (warn only)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Inspect docs frontmatter (warn only, never fail)
        env:
          DOCS_GLOB: "docs/[0-9]*.md"
        run: |
          set -uo pipefail
          today=$(date -u +%Y-%m-%d)
          today_epoch=$(date -d "${today}" +%s)
          stale_count=0
          missing_count=0
          {
            echo "## Freshness check"
            echo ""
            echo "Today (UTC): \`${today}\`"
            echo ""
            echo "| file | next_review_by | days overdue |"
            echo "|---|---|---|"
          } >> "${GITHUB_STEP_SUMMARY}"
          shopt -s nullglob
          for f in ${DOCS_GLOB}; do
            [ -f "$f" ] || continue
            # YAML frontmatter only: scan from leading '---' fence to the next '---' fence.
            # blockquote form (^> next-review-by) is intentionally NOT accepted.
            # awk extracts ^next_review_by: YYYY-MM-DD from inside the frontmatter block only.
            next_by=$(awk '
              /^---[[:space:]]*$/ { fence++; if (fence == 2) exit; next }
              fence == 1 && /^next_review_by:[[:space:]]*[0-9]{4}-[0-9]{2}-[0-9]{2}/ {
                sub(/^next_review_by:[[:space:]]*/, "")
                sub(/[[:space:]].*$/, "")
                print
                exit
              }
            ' "$f")
            if [ -z "${next_by}" ]; then
              echo "| ${f} | (missing) | n/a |" >> "${GITHUB_STEP_SUMMARY}"
              missing_count=$((missing_count + 1))
              continue
            fi
            next_epoch=$(date -d "${next_by}" +%s 2>/dev/null || echo 0)
            if [ "${next_epoch}" -lt "${today_epoch}" ]; then
              days=$(( (today_epoch - next_epoch) / 86400 ))
              echo "| ${f} | ${next_by} | ${days} |" >> "${GITHUB_STEP_SUMMARY}"
              stale_count=$((stale_count + 1))
            fi
          done
          {
            echo ""
            if [ "${stale_count}" -eq 0 ] && [ "${missing_count}" -eq 0 ]; then
              echo "All \`${DOCS_GLOB}\` docs are fresh and have \`next_review_by\` frontmatter."
            else
              echo "**${stale_count} doc(s) overdue, ${missing_count} doc(s) missing \`next_review_by\`.**"
              echo ""
              echo "This is a warning, not a CI failure (see \`docs/06-freshness-and-monitoring.md\`)."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
          # Designed to never fail: quarterly review cadence must not block CI
          exit 0
